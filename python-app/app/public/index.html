<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./app.css" rel="stylesheet" />
    <script type="module" src="./main.js"></script>
    <script src="./confetti.browser.min.js"></script>
    <title>ARSO/AXSO 2025-2 - Solar System</title>
  </head>
  <style is:global>
    :root {
      --page-w: 800px;
    }

    html {
      font-family: system-ui, sans-serif;
    }
  </style>

  <body>
    <div
      id="app"
      class="min-h-screen bg-neutral-950 text-gray-50 gap-4 flex justify-center"
    ></div>

    <template id="main">
      <div class="max-w-[1000px]">
        <header class="fixed w-screen top-0 backdrop-blur-md z-10">
          <img src="./logo_uoc.png" class="w-72 px-2 py-4" />
        </header>
        <main class="flex flex-col gap-4 px-4 py-32 justify-center">
          <section
            class="flex flex-col gap-4 lg:flex-row justify-start items-stretch"
          >
            <box
              class="flex flex-col justify-center items-center flex-1 w-full"
            >
              <div
                class="text-6xl text-center font-semibold text-transparent pb-8 bg-gradient-to-tl from-amber-500 to-yellow-400 bg-clip-text"
              >
                {{ title }}
              </div>
              <div class="text-xl self-center text-teal-500">
                🚀 Exploration Mission: Successful!! 🎉 🔭 🪐
              </div>
            </box>
            <box
              v-if="planets.length"
              class="flex flex-col items-center justify-center w-full flex-1"
            >
              <div class="text-xl font-bold">Your database response is:</div>
              <div
                class="text-transparent bg-clip-text bg-gradient-to-r from-green-200 to-green-500 font-bold text-xl font-mono"
              >
                <ul class="p-4 text-lg flex flex-col gap-2">
                  <li><span class="text-white pr-2">👤</span> {{ student }}</li>
                  <li><span class="text-white">📅 </span> {{ fmtCreated }}</li>
                </ul>
              </div>
            </box>
            <box
              v-else
              class="!bg-pink-800 text-gray-100 flex items-center justify-center flex-1 w-full"
            >
              👉 Now you should configure the connection to the database.
            </box>
          </section>
          <section v-if="planets.length" class="flex flex-col gap-4">
            <h2 class="text-3xl font-bold">Solar System Planets</h2>
            <db-table :planets="planets"></db-table>
          </section>
        </main>
      </div>
    </template>

    <template id="tbl-data">
      <section
        class="flex flex-row gap-4 items-stretch flex-wrap justify-between"
      >
        <planet-card
          v-for="planet in planets"
          :planet="planet"
          :key="planet.name"
        ></planet-card>
      </section>
    </template>

    <template id="planet-card">
      <article
        class="rounded overflow-hidden dark:shadow-lg flex flex-col max-w-72 border border-gray-800 bg-neutral-900"
      >
        <div class="relative">
          <img
            class="w-full h-48 object-cover"
            :src="planet.image"
            :alt="planet.name"
          />
          <div
            class="text-xs absolute top-0 right-0 bg-blue-600 px-4 py-2 text-white mt-3 mr-3 rounded"
          >
            Planet
          </div>
        </div>

        <div class="px-6 py-4 mb-auto">
          <div class="font-bold text-xl mb-2 text-amber-400">
            {{ planet.name }}
          </div>
          <p class="text-gray-400 text-sm">{{ planet.description }}</p>
        </div>

        <div class="px-6 py-3 flex flex-col gap-1 bg-gray-800 text-gray-200">
          <div class="flex justify-between text-xs">
            <span class="font-semibold">Distance:</span>
            <span>{{ planet.distance }}</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="font-semibold">Diameter:</span>
            <span>{{ planet.diameter }}</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="font-semibold">Gravity:</span>
            <span>{{ planet.gravity }}</span>
          </div>
        </div>
      </article>
    </template>

    <template id="box">
      <article
        class="bg-neutral-900 border-2 border-slate-400/10 rounded-xl p-4"
      >
        <slot></slot>
      </article>
    </template>
  </body>
</html>
